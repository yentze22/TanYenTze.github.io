<!DOCTYPE html>

    <link href="https://fonts.googleapis.com/css2?family=Rajdhani&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <style>
        h2{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Orbitron',sans-serif, Arial;
        }

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Rajdhani',sans-serif, Arial;
        }


        body{
            background-color:#121212;
            color:white;
        }

        /* Navigation Bar */
        nav{
            background-color:#1f1f1f;
            padding:15px;
            display:flex;           
            flex-direction:column;
            align-items:center;
        }


        .logo{
            text-align:center;
            color:#00ffcc;
            padding-bottom:10px;
            margin-bottom:5px;
        }


        nav h2{
            color:#00ffcc;
        }

        .longLine {
            width: 80%;
            height: 2px;
            background-color: white;
            border: none;
            margin: 3px auto;
        }

        nav ul{
            list-style:none;
            display:flex;
        }

        .menu{
            list-style:none;
        }

        nav ul li{
            margin-left:40px;
        }

        nav ul li a{
            color:white;
            font-weight:bold;
            text-decoration:none;
        }

        nav ul li a:hover{
            color:#00ffcc;
        }

        .search-box input {
            width: 80%;
            padding: 10px 15px;
            border-radius: 20px;
            border: 1px solid #444;
            background-color: #2a2a2a;
            color: white;
            width: 300px;
            outline: none;
        }


        /* --- GAMES GRID --- */
        .section {
            padding: 40px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 25px;
        }


        .game-card-link {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .game-card {
            background-color: #1e1e1e;
            padding: 15px;
            border-radius: 12px;
            transition: transform 0.3s ease, border-color 0.3s;
            border: 1px solid transparent;
        }

        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00ffcc;
        }

        .game-card img {
            width: 100%;
            height: 140px;
            object-fit: cover;
            border-radius: 8px;
        }

        .game-title {
            margin-top: 12px;
            font-weight: bold;
            font-size: 1.1rem;
            text-align: center;
        }

        #no-results {
            display: none;
            text-align: center;
            padding: 50px;
            color: #aaa;
        }

        footer {
            text-align: center;
            padding: 30px;
            background-color: #1f1f1f;
            margin-top: 50px;
            color: #666;
        }
    </style>
</head>
<body>

    <script>
        function filterGames() {
            const input = document.getElementById('gameSearch').value.toLowerCase();
            const cards = document.getElementsByClassName('game-card');
            const noResults = document.getElementById('no-results');
            let found = false;

            for (let i = 0; i < cards.length; i++) {
                const title = cards[i].querySelector('.game-title').innerText.toLowerCase();
                if (title.includes(input)) {
                    cards[i].style.display = "block";
                    found = true;
                } else {
                    cards[i].style.display = "none";
                }
            }
            noResults.style.display = found ? "none" : "block";
        }
    </script>
